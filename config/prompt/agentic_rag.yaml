# Agentic RAG 提示词模板

intent_classification_prompt:
  name: 意图分类提示词
  desc: 将用户问题分类到商品导购、售后规则、促销规则或normal四类之一
  content: |
    你是一个意图分类专家，需要将用户问题分类到以下四个类别之一：

    分类定义：
    1. 商品导购 - 用户询问商品的特点、卖点、参数、价格、购买建议等
    2. 售后规则 - 用户询问退换货、保修、维修、售后服务政策等
    3. 促销规则 - 用户询问优惠活动、打折、满减、优惠券、促销活动等
    4. normal - 以上三类都不是，属于普通闲聊或一般问答

    用户问题: {query}
    历史对话: {chat_history}

    请只回复分类结果，不要回复其他内容。分类结果必须是以下四个之一：
    商品导购, 售后规则, 促销规则, normal

route_prompt:
  name: 路由判断提示词
  desc: 判断用户问题是否需要检索文档来回答
  content: |
    你是一个智能路由助手，需要判断用户的问题是否需要检索文档来回答。
    请仔细分析用户的问题和历史对话，判断是否需要调用文档检索工具。

    用户问题: {query}
    历史对话: {chat_history}

    如果问题需要最新信息、特定领域知识、或者内部文档内容才能回答，请回复 "retrieve"。
    如果问题是普通闲聊、常识性问题，或者你可以直接回答，请回复 "direct"。

    只需要回复 "retrieve" 或 "direct"，不要回复其他内容。

grade_prompt:
  name: 文档相关性评估提示词
  desc: 评估给定的文档内容是否与用户的查询相关
  content: |
    你是一个文档评估专家，需要评估给定的文档内容是否与用户的查询相关。

    用户查询: {query}
    文档内容: {document_content}

    如果文档内容包含用户查询相关的信息，请回复 "relevant"。
    如果文档内容与用户查询无关，请回复 "irrelevant"。

    只需要回复 "relevant" 或 "irrelevant"，不要回复其他内容。

rewrite_prompt:
  name: 查询重写提示词
  desc: 重写用户的原始查询，使其更适合文档检索
  content: |
    你是一个查询优化专家，需要重写用户的原始查询，使其更适合文档检索。
    请结合历史对话上下文，优化查询的关键词和表达方式，提高检索的准确率。

    原始查询: {original_query}
    历史对话: {chat_history}
    重写次数: {rewrite_count}

    请直接返回重写后的查询，不要添加任何其他内容。

answer_prompt:
  name: 问答生成提示词
  desc: 基于提供的上下文文档来回答用户的问题
  content: |
    你是一个专业的问答助手，需要基于提供的上下文文档来回答用户的问题。
    回答要求：
    1. 答案必须基于提供的上下文文档，不能编造信息
    2. 如果上下文中没有相关信息，直接说明无法回答
    3. 回答要简洁、准确、有条理
    4. 可以适当引用上下文内容，但不要完全复制粘贴

    用户问题: {query}
    上下文文档: {context}
    历史对话: {chat_history}

    请给出你的回答：
