# 向量数据库配置
# 支持多种向量数据库：milvus, chroma, faiss, qdrant

# 当前使用的向量数据库提供者
provider: milvus

# Milvus 配置
milvus:
  enabled: true
  connection:
    uri: ${MILVUS_URI:-http://localhost:19530}
  default_dimension: 1024
  metric_type: COSINE
  index_type: IVF_FLAT
  n_list: 1024
  implementation: langchain_milvus
  # 新增: 启用动态字段 (Milvus 2.4+)
  enable_dynamic_field: true
  langchain_config:
    auto_id: true
    primary_key_field: pk
    vector_field: embedding
    text_field: content
    metadata_field: metadata
    # 新增: 混合检索配置 (Milvus 2.5+)
    enable_hybrid_search: false
    dense_vector_field: embedding
    sparse_vector_field: sparse_embedding
    # BM25 函数配置
    bm25_function:
      enabled: true
      input_field_names: content
      output_field_names: sparse_embedding
      enable_match: false
      function_name: null  # null 表示自动生成
      # 单语言分词器配置（与 multi_analyzer_params 二选一）
      # analyzer_params:
      #   type: chinese
        # tokenizer: null  # 可选，自定义分词器
        # filter: null     # 可选，过滤器列表
      # 多语言分词器配置（与 analyzer_params 二选一）
      # multi_analyzer_params:
      #   analyzers:
      #     chinese: { type: chinese }
      #     english: { type: english }
      #     default: { tokenizer: icu }
      #   by_field: language
      #   alias:
      #     cn: chinese
      #     en: english

# Chroma 配置
chroma:
  enabled: false
  persist_directory: data/chroma
  settings:
    anonymized_telemetry: false

# FAISS 配置
faiss:
  enabled: false
  index_type: IVF_FLAT
  metric_type: L2
  index_path: data/faiss/index.faiss

# Qdrant 配置
qdrant:
  enabled: false
  connection:
    url: ${QDRANT_URL:-http://localhost:6333}
    api_key: ${QDRANT_API_KEY:-}
  distance: Cosine
